version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: bsb_erp_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bsb_erp
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

  adminer:
    image: adminer
    container_name: bsb_erp_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

volumes:
  mysql_data:
